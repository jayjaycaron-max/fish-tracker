<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTrack Pro | CT & QC Species Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #0a0c0a;
            --card-bg: #141814;
            --accent: #b4d455;
            --gold: #f59e0b;
        }
        body {
            background-color: var(--dark-bg);
            color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1a2e1a 0%, #0a0c0a 100%);
            min-height: 100vh;
        }
        .font-header { font-family: 'Space+Grotesk', sans-serif; }
        .fish-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .badge-monster { background: linear-gradient(45deg, #7c2d12, #f59e0b); color: white; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        .badge-big { background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8; }
        .badge-tiny { background: #450a0a; color: #f87171; }
        .progress-circle { transition: stroke-dashoffset 0.8s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .region-active { background: var(--accent); color: black; font-weight: 700; }
        input[type="number"] { background: #000; border: 1px solid #333; color: var(--accent); padding: 4px 8px; width: 80px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
        <div>
            <h1 class="text-4xl font-header font-bold tracking-tighter text-white">AQUA<span class="text-[#b4d455]">TRACK</span></h1>
            <p class="text-slate-500 text-sm">Monster Catch Tracker</p>
        </div>

        <div class="flex bg-white/5 rounded-xl p-1">
            <button onclick="setRegion('ct')" id="btn-ct" class="px-6 py-2 rounded-lg text-sm">CONNECTICUT</button>
            <button onclick="setRegion('qc')" id="btn-qc" class="px-6 py-2 rounded-lg text-sm ml-1">QUÉBEC</button>
        </div>

        <div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
            <div class="relative w-16 h-16">
                <svg class="w-full h-full"><circle cx="32" cy="32" r="28" stroke="#1e293b" stroke-width="4" fill="transparent" />
                <circle id="prog-circle" class="progress-circle" cx="32" cy="32" r="28" stroke="#b4d455" stroke-width="4" fill="transparent" stroke-dasharray="175.9" stroke-dashoffset="175.9" /></svg>
                <div class="absolute inset-0 flex items-center justify-center text-xs font-bold" id="prog-percent">0%</div>
            </div>
            <div class="text-xl font-header font-bold text-white" id="prog-text">0 / 0</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        <div id="fish-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script>
        const fishData = {
            ct: [
                { id: 'ct_1', name: 'Largemouth Bass', trophy: 7, img: 'https://images.unsplash.com/photo-1544764200-d8151759f242?w=500', loc: 'Candlewood Lake' },
                { id: 'ct_2', name: 'Smallmouth Bass', trophy: 5, img: 'https://images.unsplash.com/photo-1551009175-15bdf9dcb580?w=500', loc: 'Lillinonah' },
                { id: 'ct_3', name: 'Northern Pike', trophy: 15, img: 'https://images.unsplash.com/photo-1598284534795-9276d1e4ec30?w=500', loc: 'Bantam Lake' },
                { id: 'ct_4', name: 'Walleye', trophy: 6, img: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500', loc: 'Squantz Pond' },
                { id: 'ct_5', name: 'Brook Trout', trophy: 2, img: 'https://images.unsplash.com/photo-1629805908902-8692629b7754?w=500', loc: 'Farmington River' }
            ],
            qc: [
                { id: 'qc_1', name: 'Muskellunge', trophy: 30, img: 'https://images.unsplash.com/photo-1544764200-d8151759f242?w=500', loc: 'St-Lawrence River' },
                { id: 'qc_2', name: 'Walleye (Doré)', trophy: 8, img: 'https://images.unsplash.com/photo-1550921095-72848f98ec81?w=500', loc: 'Gouin Reservoir' },
                { id: 'qc_3', name: 'Arctic Char', trophy: 10, img: 'https://images.unsplash.com/photo-1524704659698-1fd30be7fa9d?w=500', loc: 'Nunavik Streams' }
            ]
        };

        let currentRegion = 'ct';
        let storage = JSON.parse(localStorage.getItem('aquaProData')) || {};

        function setRegion(reg) {
            currentRegion = reg;
            document.querySelectorAll('button').forEach(b => b.classList.remove('region-active'));
            document.getElementById(`btn-${reg}`).classList.add('region-active');
            render();
        }

        function toggleCaught(id) {
            if (!storage[id]) storage[id] = { caught: false, weight: 0 };
            storage[id].caught = !storage[id].caught;
            save();
        }

        function updateWeight(id, val) {
            storage[id].weight = parseFloat(val) || 0;
            save();
        }

        function save() {
            localStorage.setItem('aquaProData', JSON.stringify(storage));
            render();
        }

        function getBadge(weight, trophy) {
            if (!weight || weight <= 0) return '';
            const ratio = weight / trophy;
            if (ratio >= 0.85) return '<span class="badge badge-monster">Monster</span>';
            if (ratio >= 0.5) return '<span class="badge badge-big">Big</span>';
            if (ratio <= 0.1) return '<span class="badge badge-tiny">Tiny</span>';
            return '<span class="badge" style="background:#333">Average</span>';
        }

        function render() {
            const grid = document.getElementById('fish-grid');
            grid.innerHTML = '';
            const list = fishData[currentRegion];
            let caughtCount = 0;

            list.forEach(fish => {
                const d = storage[fish.id] || { caught: false, weight: 0 };
                if (d.caught) caughtCount++;
                const card = document.createElement('div');
                card.className = `fish-card rounded-3xl p-5 ${d.caught ? 'border-[#b4d455]' : ''}`;
                card.innerHTML = `
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-4">
                        <img src="${fish.img}" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2">${getBadge(d.weight, fish.trophy)}</div>
                    </div>
                    <div class="flex justify-between items-start">
                        <div><h3 class="text-xl font-bold font-header">${fish.name}</h3><p class="text-xs text-slate-500 uppercase">${fish.loc}</p></div>
                        <button onclick="toggleCaught('${fish.id}')" class="h-10 w-10 rounded-full border-2 border-white/10 ${d.caught ? 'bg-[#b4d455] text-black' : ''}">${d.caught ? '✓' : ''}</button>
                    </div>
                    ${d.caught ? `<div class="mt-4 pt-4 border-t border-white/5 flex justify-between items-center"><input type="number" step="0.1" value="${d.weight}" onchange="updateWeight('${fish.id}', this.value)" placeholder="lbs"> <span class="text-[10px] text-slate-500">Trophy: ${fish.trophy}lb</span></div>` : ''}`;
                grid.appendChild(card);
            });

            const percent = Math.round((caughtCount / list.length) * 100);
            document.getElementById('prog-text').innerText = `${caughtCount} / ${list.length}`;
            document.getElementById('prog-percent').innerText = `${percent}%`;
            document.getElementById('prog-circle').style.strokeDashoffset = 175.9 - (percent / 100) * 175.9;
        }

        setRegion('ct');
    </script>
</body>
</html>
